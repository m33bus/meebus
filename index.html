<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Floating Head</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: manipulation;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 20;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      letter-spacing: 0.02em;
      pointer-events: none;
      text-align: center;
      background: rgba(0,0,0,0.25);
      padding: 8px 12px;
      border-radius: 999px;
      backdrop-filter: blur(2px);
    }

    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 30;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
      max-width: 72vw;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">tap anywhere and he looks there</div>
  <div id="status">loading…</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    const statusEl = document.getElementById("status");
    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log(msg);
    }

    if (!window.THREE) {
      setStatus("three.js failed to load");
      throw new Error("THREE not loaded");
    }

    setStatus("three.js loaded\nloading model…");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      34,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0.03, 3.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.1);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 2.4);
    key.position.set(2.5, 2.5, 5);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xffffff, 1.0);
    fill.position.set(-2.8, 0.6, 3);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffffff, 1.15);
    rim.position.set(0, 1.8, -3);
    scene.add(rim);

    const pivot = new THREE.Group();
    scene.add(pivot);

    let head = null;

    const target = { x: 0, y: 0 };
    const current = { x: 0, y: 0 };

    let lookMode = "wander";
    let lookTimer = 0;
    let nextDecision = 1.5 + Math.random() * 2.5;

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function chooseWanderTarget() {
      target.x = randomRange(-0.28, 0.28);
      target.y = randomRange(-0.12, 0.18);
      nextDecision = randomRange(1.8, 4.5);
    }

    function lookAtTap(clientX, clientY) {
      const nx = (clientX / window.innerWidth - 0.5) * 2;
      const ny = (clientY / window.innerHeight - 0.5) * 2;

      target.x = THREE.MathUtils.clamp(nx * 0.55, -0.55, 0.55);
      target.y = THREE.MathUtils.clamp(-ny * 0.33, -0.28, 0.32);

      lookMode = "tap";
      lookTimer = 0;
      nextDecision = randomRange(2.2, 4.0);
    }

    window.addEventListener("pointerdown", (e) => {
      lookAtTap(e.clientX, e.clientY);
    });

    window.addEventListener("touchstart", (e) => {
      if (e.touches && e.touches.length > 0) {
        const t = e.touches[0];
        lookAtTap(t.clientX, t.clientY);
      }
    }, { passive: true });

    const loader = new THREE.GLTFLoader();
    loader.load(
      "./models/head.glb",
      function (gltf) {
        head = gltf.scene;

        const box = new THREE.Box3().setFromObject(head);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);

        head.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2.1 / maxDim;
        head.scale.setScalar(scale);

        head.traverse(function (child) {
          if (child.isMesh && child.geometry) {
            child.geometry.computeVertexNormals();
            if (child.material) {
              child.material.needsUpdate = true;
            }
          }
        });

        pivot.add(head);
        setStatus("model loaded");
      },
      undefined,
      function (error) {
        console.error(error);
        setStatus("MODEL FAILED\ncheck models/head.glb");
      }
    );

    const clock = new THREE.Clock();
    chooseWanderTarget();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;

      if (head) {
        lookTimer += dt;

        if (lookMode === "tap" && lookTimer > nextDecision) {
          lookMode = "wander";
          chooseWanderTarget();
          lookTimer = 0;
        }

        if (lookMode === "wander" && lookTimer > nextDecision) {
          chooseWanderTarget();
          lookTimer = 0;
        }

        current.x += (target.x - current.x) * 0.032;
        current.y += (target.y - current.y) * 0.028;

        pivot.position.y = Math.sin(t * 0.9) * 0.055;
        pivot.position.x = Math.sin(t * 0.33) * 0.018;

        const idleYaw = Math.sin(t * 0.41) * 0.045;
        const idlePitch = Math.sin(t * 0.57) * 0.018;
        const idleRoll = Math.sin(t * 0.31 + 1.4) * 0.012;

        pivot.rotation.y = current.x + idleYaw;
        pivot.rotation.x = current.y + idlePitch;
        pivot.rotation.z = idleRoll;
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
