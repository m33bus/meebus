<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Meeb Head</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.08, 5.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x101010, 1.45);
    hemi.position.set(0, 2, 0);
    scene.add(hemi);

    const key = new THREE.DirectionalLight(0xffffff, 2.0);
    key.position.set(2.4, 1.8, 4.5);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xffffff, 0.9);
    fill.position.set(-2.5, 0.6, 2.3);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffffff, 1.15);
    rim.position.set(0.4, 2.8, -3.2);
    scene.add(rim);

    const headRoot = new THREE.Group();
    scene.add(headRoot);

    const headPivot = new THREE.Group();
    headRoot.add(headPivot);

    const loader = new GLTFLoader();

    let model;
    let lookTargetX = 0;
    let lookTargetY = 0;
    let lookCurrentX = 0;
    let lookCurrentY = 0;

    let idleX = 0;
    let idleY = 0;
    let nextIdleShiftAt = 0;

    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
    const rand = (min, max) => min + Math.random() * (max - min);

    function scheduleIdleShift(now) {
      nextIdleShiftAt = now + rand(1.2, 3.4);
      idleX = rand(-0.18, 0.18);
      idleY = rand(-0.10, 0.12);
    }

    function setLookFromScreen(x, y) {
      const nx = (x / window.innerWidth) * 2 - 1;
      const ny = -((y / window.innerHeight) * 2 - 1);

      // Gentle, realistic head-turn range.
      lookTargetX = clamp(nx * 0.6, -0.42, 0.42);
      lookTargetY = clamp(ny * 0.32, -0.22, 0.22);
    }

    window.addEventListener('pointerdown', (e) => setLookFromScreen(e.clientX, e.clientY), { passive: true });
    window.addEventListener('pointermove', (e) => {
      if (e.pointerType === 'mouse') setLookFromScreen(e.clientX, e.clientY);
    }, { passive: true });

    loader.load('./Newmeeb.glb', (gltf) => {
      model = gltf.scene;

      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      model.position.sub(center);

      // Fit model nicely in frame.
      const tallest = Math.max(size.x, size.y, size.z);
      const scale = 3.35 / tallest;
      model.scale.setScalar(scale);

      const fittedBox = new THREE.Box3().setFromObject(model);
      const fittedCenter = new THREE.Vector3();
      fittedBox.getCenter(fittedCenter);
      model.position.x -= fittedCenter.x;
      model.position.y -= fittedCenter.y - 0.12;
      model.position.z -= fittedCenter.z;

      model.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = false;
          obj.receiveShadow = false;
          if (obj.material) {
            obj.material.needsUpdate = true;
          }
        }
      });

      headPivot.add(model);
    });

    const clock = new THREE.Clock();
    scheduleIdleShift(0);

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      if (t >= nextIdleShiftAt) {
        scheduleIdleShift(t);
      }

      const combinedTargetX = clamp(lookTargetX * 0.75 + idleX, -0.46, 0.46);
      const combinedTargetY = clamp(lookTargetY * 0.72 + idleY, -0.25, 0.25);

      lookCurrentX += (combinedTargetX - lookCurrentX) * 0.045;
      lookCurrentY += (combinedTargetY - lookCurrentY) * 0.045;

      headRoot.position.y = Math.sin(t * 0.9) * 0.08;
      headRoot.rotation.z = Math.sin(t * 0.38) * 0.012;

      headPivot.rotation.y = lookCurrentX;
      headPivot.rotation.x = -lookCurrentY + Math.sin(t * 0.55) * 0.018;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
